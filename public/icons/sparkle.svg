    sparkle.svg — 4-point starburst sparkle
    Classic beauty/luxury sparkle: elongated horizontal and vertical arms,
    pinched at the diagonals for a sharp, elegant shape.
    Use on: Glam tier, hero accents, pricing callouts, decorative accents.
  -->

