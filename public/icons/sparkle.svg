           L22 12
           L13.4 13.4
           L12 22
           L10.6 13.4
           L2 12
           L10.6 10.6
           Z"/>

  <!-- Small secondary sparkle — upper right -->
  <path d="M19.5 3.5
           L20 5
           L21.5 5.5
           L20 6
           L19.5 7.5
           L19 6
           L17.5 5.5
           L19 5
           Z"
        opacity="0.55"/>
