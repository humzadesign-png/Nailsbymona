<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!--
    camera.svg — Smart camera with sparkle accent
    Standard camera body + lens. Small 4-point sparkle in the upper corner
    signals the "guided smart capture" feature of the sizing step.
    Use on: Live sizing capture step, photo upload button.
  -->

  <!-- Camera body -->
  <path d="M3 8H8L10 5H14L16 8H21
           C21.6 8 22 8.4 22 9
           V18C22 18.6 21.6 19 21 19
           H3C2.4 19 2 18.6 2 18
           V9C2 8.4 2.4 8 3 8Z"/>

  <!-- Lens ring -->
  <circle cx="12" cy="13.5" r="3.5"/>

  <!-- Sparkle accent — upper right, indicating guided/smart mode -->
  <path d="M19.5 3
           L20.1 4.9
           L22 5.5
           L20.1 6.1
           L19.5 8
           L18.9 6.1
           L17 5.5
           L18.9 4.9
           Z"
        fill="currentColor" stroke="none"/>
</svg>
