<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!--
    nail.svg — Almond press-on gel nail
    True almond silhouette: curved sides taper smoothly from rounded base
    to a softly pointed tip. Matches the shape of an actual press-on nail.
    Use on: product cards, shop nav, tier badges.
  -->

  <!-- Nail body — smooth bezier on all 4 sides for proper almond shape -->
  <path d="M12 3
           C14.6 3 16.5 5.6 16.5 9
           L16.5 15.5
           C16.5 18.8 14.5 21 12 21
           C9.5 21 7.5 18.8 7.5 15.5
           L7.5 9
           C7.5 5.6 9.4 3 12 3
           Z"/>

  <!-- Shine highlight — top-left arc suggesting a gel finish -->
  <path d="M10 8 C10 6.2 10.8 4.8 12 4.2"/>
</svg>
