<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" fill="none" stroke="#BFA4CE" stroke-linecap="round" stroke-linejoin="round">

  <!-- Coin circle above middle finger -->
  <circle cx="215" cy="148" r="38" stroke-width="3" stroke-dasharray="10 6"/>
  <!-- Coin symbol -->
  <text x="215" y="154" text-anchor="middle" font-family="DM Sans, ui-sans-serif, system-ui" font-size="18" fill="#BFA4CE" stroke="none">₨</text>

  <!-- Pinky finger — leftmost, notably shortest (~50% of middle height) -->
  <path d="M50,460 L50,360 Q50,330 77,330 Q104,330 104,360 L104,460"
        stroke-width="3" stroke-dasharray="10 6"/>

  <!-- Ring finger (~80% of middle) -->
  <path d="M118,460 L118,280 Q118,250 146,250 Q174,250 174,280 L174,460"
        stroke-width="3" stroke-dasharray="10 6"/>

  <!-- Middle finger — tallest, coin sits above -->
  <path d="M188,460 L188,228 Q188,200 216,200 Q244,200 244,228 L244,460"
        stroke-width="3" stroke-dasharray="10 6"/>

  <!-- Index finger (~77% of middle) -->
  <path d="M258,460 L258,288 Q258,258 286,258 Q314,258 314,288 L314,460"
        stroke-width="3" stroke-dasharray="10 6"/>

  <!-- Small label -->
  <text x="215" y="178" text-anchor="middle" font-family="DM Sans, ui-sans-serif, system-ui"
        font-size="11" letter-spacing="2" fill="#BFA4CE" stroke="none" opacity="0.7">COIN ABOVE MIDDLE NAIL</text>

</svg>
