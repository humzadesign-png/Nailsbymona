<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" fill="none" stroke="#BFA4CE" stroke-linecap="round" stroke-linejoin="round">

  <!-- Coin circle above middle finger -->
  <circle cx="220" cy="148" r="38" stroke-width="3" stroke-dasharray="10 6"/>
  <!-- Coin symbol -->
  <text x="220" y="154" text-anchor="middle" font-family="DM Sans, ui-sans-serif, system-ui" font-size="18" fill="#BFA4CE" stroke="none">₨</text>

  <!-- Pinky finger — 70px wide, center x=47, x=12-82. 13px gap to ring. ~75% of middle height -->
  <path d="M12,460 L12,300 Q12,265 47,265 Q82,265 82,300 L82,460"
        stroke-width="3" stroke-dasharray="10 6"/>

  <!-- Ring finger — 75px wide, center x=132, x=95-170. 13px gap each side. ~90% of middle height -->
  <path d="M95,460 L95,244 Q95,226 132,226 Q170,226 170,244 L170,460"
        stroke-width="3" stroke-dasharray="10 6"/>

  <!-- Middle finger — 75px wide, center x=220, x=183-258. 13px gap each side. Tallest -->
  <path d="M183,460 L183,238 Q183,200 220,200 Q258,200 258,238 L258,460"
        stroke-width="3" stroke-dasharray="10 6"/>

  <!-- Index finger — 75px wide, center x=308, x=271-346. 13px gap to middle. ~88% of middle height -->
  <path d="M271,460 L271,249 Q271,231 308,231 Q346,231 346,249 L346,460"
        stroke-width="3" stroke-dasharray="10 6"/>

  <!-- Small label -->
  <text x="220" y="178" text-anchor="middle" font-family="DM Sans, ui-sans-serif, system-ui"
        font-size="11" letter-spacing="2" fill="#BFA4CE" stroke="none" opacity="0.7">COIN ABOVE MIDDLE NAIL</text>

</svg>
