<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!--
    ribbon.svg — Decorative bow / ribbon
    Two smooth D-shaped loops (left and right), two gently curved tails
    dropping diagonally, and a solid filled knot at center.
    Use on: Bridal Trio package, premium packaging callout, gift card product.
  -->

  <!-- Left bow loop — smooth closed teardrop -->
  <path d="M12 12
           C10 10.5 5.5 9.5 4.5 11.5
           C3.5 13.5 7 14.5 12 12"/>

  <!-- Right bow loop — mirror -->
  <path d="M12 12
           C14 10.5 18.5 9.5 19.5 11.5
           C20.5 13.5 17 14.5 12 12"/>

  <!-- Left tail — curved gracefully downward -->
  <path d="M12 13 C10.5 14.5 9 17 8 19.5"/>

  <!-- Right tail — mirror curve -->
  <path d="M12 13 C13.5 14.5 15 17 16 19.5"/>

  <!-- Center knot — solid filled circle -->
  <circle cx="12" cy="12.5" r="1.5" fill="currentColor" stroke="none"/>
</svg>
