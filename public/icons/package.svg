<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!--
    package.svg — Gift box with ribbon bow
    Rigid magnetic box (as used in Nails by Mona's premium packaging)
    with a proper bow sitting above the lid. Bow loops use smooth bezier curves.
    Use on: Order confirmation, premium packaging callout, delivery info.
  -->

  <!-- Box lid (the strip at the top) -->
  <rect x="3" y="8" width="18" height="3" rx="1"/>

  <!-- Box body -->
  <rect x="3.5" y="11" width="17" height="10.5" rx="0.5"/>

  <!-- Vertical ribbon running down the center -->
  <line x1="12" y1="8" x2="12" y2="21.5"/>

  <!-- Bow — left loop: smooth teardrop bezier -->
  <path d="M12 8.5
           C10.5 6.2 7.5 5.5 6.2 6.8
           C5 8 7 9.2 12 8.5"/>

  <!-- Bow — right loop: mirror of left -->
  <path d="M12 8.5
           C13.5 6.2 16.5 5.5 17.8 6.8
           C19 8 17 9.2 12 8.5"/>
</svg>
