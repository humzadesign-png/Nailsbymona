<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!--
    bridal.svg — Diamond engagement ring
    Classic solitaire ring: clean circle band + elongated kite-cut diamond
    with girdle line and table facet. Every line serves a purpose.
    Use on: Bridal nav, Bridal Trio card, bridal page hero.
  -->

  <!-- Ring band — full circle sitting at the base -->
  <circle cx="12" cy="16.5" r="5"/>

  <!-- Diamond — elongated kite shape; bottom culet sits inside the ring -->
  <path d="M9 12 L10.5 9.5 L12 5 L13.5 9.5 L15 12 L12 15.5 Z"/>

  <!-- Girdle line — widest point of the diamond -->
  <line x1="9" y1="12" x2="15" y2="12"/>

  <!-- Table facet — flat top of the crown -->
  <line x1="10.5" y1="9.5" x2="13.5" y2="9.5"/>
</svg>
