<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!--
    palette.svg — Artist colour palette
    Classic thumb-hole palette shape with four paint dabs arranged along the
    upper arc. The thumb hole indentation at the lower-right reads clearly.
    Use on: Design customisation, colour-choice step, "design your set" section.
  -->

  <!-- Palette body — organic shape with thumb cutout at lower right -->
  <path d="M12 2
           C6.5 2 2 6.5 2 12
           C2 17.5 6.5 22 12 22
           C13.1 22 14 21.1 14 20
           C14 19.4 13.8 18.9 13.4 18.5
           C13.1 18.1 13 17.7 13 17.2
           C13 16.1 13.9 15.2 15 15.2
           H17
           C19.8 15.2 22 13 22 10.2
           C22 5.6 17.5 2 12 2Z"/>

  <!-- Paint dabs — four colour swatches along the upper arc -->
  <circle cx="7"   cy="11"  r="1.2" fill="currentColor" stroke="none"/>
  <circle cx="9"   cy="7.5" r="1.2" fill="currentColor" stroke="none"/>
  <circle cx="12"  cy="6"   r="1.2" fill="currentColor" stroke="none"/>
  <circle cx="15.5" cy="7.5" r="1.2" fill="currentColor" stroke="none"/>
</svg>
